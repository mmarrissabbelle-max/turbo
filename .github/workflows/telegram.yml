name: Send Telegram
on:
  repository_dispatch:
    types: [lead]
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send message
        run: |
          MSG="${{ github.event.client_payload.msg }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT }}" \
            --data-urlencode "text=${MSG}"
